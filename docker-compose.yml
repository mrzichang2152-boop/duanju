version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/db.sqlite3
      - SECRET_KEY=changeme
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - CORS_ORIGINS=*
    volumes:
      - ./data:/app/data
    ports:
      - "8003:8000"
    networks:
      - duanju-net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    restart: always
    ports:
      - "3001:3000"
    networks:
      - duanju-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - duanju-net

networks:
  duanju-net:
    driver: bridge
