events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # HTTP -> HTTPS 重定向（仅针对域名；localhost/127.0.0.1 由下方的 default_server 承接）
    server {
        listen 80;
        server_name zichang.fun www.zichang.fun;
        return 301 https://$host$request_uri;
    }

    # localhost 保持原有逻辑（HTTP 直连）；设为 default_server 兜底未匹配域名
    server {
        listen 80 default_server;
        server_name localhost 127.0.0.1;
        client_max_body_size 50m;
        resolver 127.0.0.11 valid=10s ipv6=off;

        location / {
            set $upstream_frontend frontend;
            proxy_pass http://$upstream_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_connect_timeout 1200;
            proxy_send_timeout 1200;
            proxy_read_timeout 1200;
            send_timeout 1200;
        }
    }

    # HTTPS 域名站（裸 IP 走 default_server 也正常）
    server {
        listen 443 ssl default_server;
        server_name zichang.fun www.zichang.fun;

        ssl_certificate     /etc/nginx/certs/zichang.fun.pem;
        ssl_certificate_key /etc/nginx/certs/zichang.fun.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 50m;
        resolver 127.0.0.11 valid=10s ipv6=off;

        location / {
            set $upstream_frontend frontend;
            proxy_pass http://$upstream_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_connect_timeout 1200;
            proxy_send_timeout 1200;
            proxy_read_timeout 1200;
            send_timeout 1200;
        }
    }
}
